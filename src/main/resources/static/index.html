<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="page">
        <section class="card header">
            <div>
                <h1>My Blog</h1>
                <p class="subtitle">Single-page blog website built with Spring Boot, MySQL, HTML, CSS, and JavaScript.</p>
            </div>
            <button id="refreshBtn" class="secondary-btn" type="button">Refresh Posts</button>
        </section>

        <section class="card">
            <div class="section-head">
                <h2 id="formTitle">Create Blog Post</h2>
                <button id="cancelEditBtn" class="secondary-btn hidden" type="button">Cancel Edit</button>
            </div>
            <form id="postForm" class="stack">
                <input id="editingId" type="hidden">
                <input id="titleInput" type="text" placeholder="Blog title" required>
                <textarea id="contentInput" placeholder="Write your blog content..." required></textarea>
                <div class="row">
                    <button class="primary-btn" type="submit">Save Post</button>
                </div>
                <p id="message" class="message"></p>
            </form>
        </section>

        <section class="card">
            <div class="section-head">
                <h2>All Posts</h2>
            </div>
            <div id="posts" class="posts"></div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
